<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Cloud - Todo App Nâng Cấp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-6">

    <div class="max-w-2xl mx-auto w-full my-auto">
        <a href="index.html" class="text-sm text-sky-400 hover:underline mb-6 inline-block">
            <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại Dashboard
        </a>

        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <h1 class="text-xl font-bold text-sky-400 mb-6 border-b border-slate-700 pb-3 flex items-center gap-2">
                <i class="fa-solid fa-database"></i> Quản Lý Công Việc Song Song (Supabase Cloud)
            </h1>

            <div class="flex gap-2 mb-8">
                <input type="text" id="todo-input" placeholder="Nhập việc cần làm..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-sky-500 transition-colors">
                <button id="btn-add" class="bg-sky-500 hover:bg-sky-600 text-slate-950 font-bold px-5 rounded-xl transition-all cursor-pointer shadow-lg shadow-sky-500/10">
                    <i class="fa-solid fa-plus"></i> Thêm việc
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="bg-slate-900/40 border border-slate-700/60 p-4 rounded-xl">
                    <h2 class="text-sm font-bold text-amber-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left"></i> Việc Tồn Đọng (<span id="count-pending">0</span>)
                    </h2>
                    <ul id="list-pending" class="space-y-3 max-h-80 overflow-y-auto pr-1">
                        <li class="text-center text-slate-600 text-xs py-4">Đang đồng bộ...</li>
                    </ul>
                </div>

                <div class="bg-slate-900/40 border border-slate-700/60 p-4 rounded-xl">
                    <h2 class="text-sm font-bold text-emerald-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-circle-check"></i> Việc Đã Làm (<span id="count-completed">0</span>)
                    </h2>
                    <ul id="list-completed" class="space-y-3 max-h-80 overflow-y-auto pr-1">
                        <li class="text-center text-slate-600 text-xs py-4">Đang đồng bộ...</li>
                    </ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fcxwvevbsvzectiaacmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjeHd2ZXZic3Z6ZWN0aWFhY21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTAzMDksImV4cCI6MjA5NTQ4NjMwOX0._380dtxl812Uq6ZgGM_mM0yjLVyhp7g205wuRnlwa_g';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const todoInput = document.getElementById('todo-input');
        const btnAdd = document.getElementById('btn-add');
        const listPending = document.getElementById('list-pending');
        const listCompleted = document.getElementById('list-completed');
        const countPending = document.getElementById('count-pending');
        const countCompleted = document.getElementById('count-completed');

        // 1. HÀM ĐỌC VÀ PHÂN LOẠI DỮ LIỆU TỪ SUPABASE
        async function fetchTodos() {
            const { data, error } = await _supabase
                .from('todos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Lỗi tải dữ liệu:', error);
                listPending.innerHTML = '<li class="text-center text-red-400 text-xs py-4">Lỗi tải dữ liệu!</li>';
                return;
            }

            // Phân loại công việc
            const pendingTodos = data.filter(todo => !todo.is_completed);
            const completedTodos = data.filter(todo => todo.is_completed);

            // Cập nhật số lượng
            countPending.textContent = pendingTodos.length;
            countCompleted.textContent = completedTodos.length;

            // Hiển thị công việc tồn đọng
            listPending.innerHTML = pendingTodos.length === 0 
                ? '<li class="text-center text-slate-600 text-xs py-4">Không có việc cần làm 🎉</li>'
                : pendingTodos.map(todo => `
                    <li class="bg-slate-800 p-3 rounded-lg border border-slate-700 flex items-center justify-between gap-3 group hover:border-amber-500/50 transition-all">
                        <div class="flex items-center gap-3 flex-1">
                            <button onclick="toggleTodo(${todo.id}, true)" class="text-amber-400 hover:text-amber-300 transition-colors">
                                <i class="fa-solid fa-circle text-lg"></i>
                            </button>
                            <span class="text-sm text-slate-200">${todo.title}</span>
                        </div>
                        <button onclick="deleteTodo(${todo.id})" class="text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 transition-all text-sm">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </li>
                `).join('');

            // Hiển thị công việc đã làm
            listCompleted.innerHTML = completedTodos.length === 0 
                ? '<li class="text-center text-slate-600 text-xs py-4">Chưa có việc hoàn thành</li>'
                : completedTodos.map(todo => `
                    <li class="bg-slate-800 p-3 rounded-lg border border-slate-700 flex items-center justify-between gap-3 group hover:border-emerald-500/50 transition-all opacity-75">
                        <div class="flex items-center gap-3 flex-1">
                            <button onclick="toggleTodo(${todo.id}, false)" class="text-emerald-400 hover:text-emerald-300 transition-colors">
                                <i class="fa-solid fa-circle-check text-lg"></i>
                            </button>
                            <span class="text-sm text-slate-300 line-through">${todo.title}</span>
                        </div>
                        <button onclick="deleteTodo(${todo.id})" class="text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 transition-all text-sm">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </li>
                `).join('');
        }

        // 2. HÀM THÊM CÔNG VIỆC MỚI
        async function addTodo(title) {
            if (!title.trim()) return;

            const { error } = await _supabase
                .from('todos')
                .insert([{ title: title.trim(), is_completed: false }]);

            if (error) {
                console.error('Lỗi thêm công việc:', error);
                alert('Lỗi khi thêm công việc!');
            } else {
                todoInput.value = '';
                fetchTodos();
            }
        }

        // 3. HÀM THAY ĐỔI TRẠNG THÁI CÔNG VIỆC
        async function toggleTodo(id, newStatus) {
            const { error } = await _supabase
                .from('todos')
                .update({ is_completed: newStatus })
                .eq('id', id);

            if (error) {
                console.error('Lỗi cập nhật:', error);
            } else {
                fetchTodos();
            }
        }

        // 4. HÀM XÓA CÔNG VIỆC
        async function deleteTodo(id) {
            if (!confirm('Bạn chắc chắn muốn xóa công việc này?')) return;

            const { error } = await _supabase
                .from('todos')
                .delete()
                .eq('id', id);

            if (error) {
                console.error('Lỗi xóa công việc:', error);
                alert('Lỗi khi xóa công việc!');
            } else {
                fetchTodos();
            }
        }

        // 5. THEO DÕI THAY ĐỔI REAL-TIME TỪ SUPABASE
        _supabase
            .channel('todos')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, () => {
                fetchTodos();
            })
            .subscribe();

        // 6. SỰ KIỆN NÚT THÊM
        btnAdd.addEventListener('click', () => addTodo(todoInput.value));
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo(todoInput.value);
        });

        // 7. KHỞI ĐỘNG - TẢI DỮ LIỆU KHI MỞ TRANG
        fetchTodos();
    </script>

    <footer class="text-center text-slate-600 text-xs my-8 border-t border-slate-800 pt-4">
        © 2026 Lớp Học AI Căn Bản - Quản lý công việc Real-time với Supabase.
    </footer>

</body>
</html>
