<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Cloud - Todo App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-6">

    <div class="max-w-xl mx-auto w-full my-auto">
        <a href="index.html" class="text-sm text-sky-400 hover:underline mb-6 inline-block">
            <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại Dashboard
        </a>

        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <h1 class="text-xl font-bold text-sky-400 mb-6 border-b border-slate-700 pb-3 flex items-center gap-2">
                <i class="fa-solid fa-list-check"></i> Việc Cần Làm Hôm Nay (Dữ liệu đám mây Supabase)
            </h1>

            <div class="flex gap-2 mb-6">
                <input type="text" id="todo-input" placeholder="Nhập việc cần làm..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-sky-500 transition-colors">
                <button id="btn-add" class="bg-sky-500 hover:bg-sky-600 text-slate-950 font-bold px-5 rounded-xl transition-all cursor-pointer shadow-lg shadow-sky-500/10">
                    <i class="fa-solid fa-plus"></i> Thêm
                </button>
            </div>

            <ul id="todo-list" class="space-y-3 max-h-80 overflow-y-auto pr-1">
                <li class="text-center text-slate-500 text-sm py-4">Đang đồng bộ dữ liệu với Cloud...</li>
            </ul>
        </div>
    </div>

    <script>
        // ⚠️ CHÚ Ý: Thay thông số chính xác từ Project Supabase của bạn vào đây
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        // Khởi tạo thực thể Supabase Client
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const btnAdd = document.getElementById('btn-add');

        // 1. HÀM TẢI (READ) DỮ LIỆU TỪ SUPABASE
        async function fetchTodos() {
            const { data, error } = await _supabase
                .from('todos')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error('Lỗi khi lấy dữ liệu:', error);
                return;
            }

            // Xóa trắng danh sách cũ để render mới
            todoList.innerHTML = '';

            if(data.length === 0) {
                todoList.innerHTML = `<li class="text-center text-slate-500 text-sm py-4">Tuyệt vời! Không có việc gì tồn đọng.</li>`;
                return;
            }

            data.forEach(todo => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between bg-slate-900/60 border border-slate-700/50 p-4 rounded-xl";
                li.innerHTML = `
                    <span class="text-slate-200 ${todo.is_completed ? 'line-through text-slate-500' : ''}">${todo.title}</span>
                    <button onclick="deleteTodo(${todo.id})" class="text-red-400 hover:text-red-500 p-1 cursor-pointer transition-colors">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        // 2. HÀM THÊM (CREATE) DỮ LIỆU
        async function addTodo() {
            const title = todoInput.value.trim();
            if (!title) return;

            const { error } = await _supabase
                .from('todos')
                .insert([{ title: title, is_completed: false }]);

            if (error) {
                alert('Lỗi khi thêm: ' + error.message);
            } else {
                todoInput.value = '';
                fetchTodos(); // Load lại danh sách sau khi thêm
            }
        }

        // 3. HÀM XÓA (DELETE) DỮ LIỆU
        async function deleteTodo(id) {
            const { error } = await _supabase
                .from('todos')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Lỗi khi xóa: ' + error.message);
            } else {
                fetchTodos(); // Load lại danh sách sau khi xóa
            }
        }

        // Lắng nghe sự kiện người dùng tương tác
        btnAdd.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Chạy ứng dụng load dữ liệu ngay khi mở trình duyệt
        window.onload = fetchTodos;
    </script>
</body>
</html>
